[os]
format = "[ $symbol ]($style)"
style = "bg:#a3aed2 fg:#090c0c"
disabled = false

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"
